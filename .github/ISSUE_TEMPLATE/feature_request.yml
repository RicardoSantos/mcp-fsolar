name: Feature request
description: Propose a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that isn't possible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? API shape, behaviour, config options.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds you've tried or other approaches you ruled out.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - FelicityClient
        - Snapshot store / polling
        - computeHealth
        - computeAutonomy
        - HookStore / webhooks
        - snapshotEmitter / telemetry
        - MCP server / tools
        - REST API
        - TypeScript types
        - Documentation
        - Other
    validations:
      required: true
